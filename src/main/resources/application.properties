# EDDI Operator Configuration
quarkus.application.name=eddi-operator
quarkus.application.version=${quarkus.application.version:6.0.0}

# Operator SDK Configuration
quarkus.operator-sdk.crd.apply=true
quarkus.operator-sdk.crd.validate=true
quarkus.operator-sdk.generate-csv=true

# Kubernetes client — trust-certs only in dev mode (production should use proper CA bundles)
%dev.quarkus.kubernetes-client.trust-certs=true

# Leader election for HA deployments (prevents dual reconciliation)
quarkus.operator-sdk.leader-election.enabled=true

# Health endpoints
quarkus.health.extensions.enabled=true

# Container image (Jib)
quarkus.container-image.group=labsai
quarkus.container-image.name=eddi-operator
quarkus.container-image.tag=${quarkus.application.version}
quarkus.container-image.registry=quay.io
quarkus.container-image.build=false
quarkus.container-image.push=false

# OLM Bundle generation
quarkus.operator-sdk.bundle.package-name=eddi-operator
quarkus.operator-sdk.bundle.channels=alpha,stable
quarkus.operator-sdk.bundle.default-channel=stable

# Logging
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."ai.labs.eddi.operator".level=DEBUG

# Native image
quarkus.native.additional-build-args=--initialize-at-run-time=org.bouncycastle
