name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: quay.io
  ORG: labsai
  OPERATOR_IMAGE: eddi-operator
  BUNDLE_IMAGE: eddi-operator-bundle

jobs:
  release:
    name: Build, Push & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Test
        run: ./mvnw verify

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build & Push JVM image
        run: |
          docker build -f Dockerfile.jvm \
            -t ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.OPERATOR_IMAGE }}:${{ steps.version.outputs.VERSION }} \
            -t ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.OPERATOR_IMAGE }}:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.OPERATOR_IMAGE }}:${{ steps.version.outputs.VERSION }}
          docker push ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.OPERATOR_IMAGE }}:latest

      - name: Set up GraalVM 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'mandrel'
          cache: 'maven'

      - name: Build & Push native image
        run: |
          ./mvnw package -Pnative -DskipTests
          docker build -f Dockerfile.native \
            -t ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.OPERATOR_IMAGE }}:${{ steps.version.outputs.VERSION }}-native \
            .
          docker push ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.OPERATOR_IMAGE }}:${{ steps.version.outputs.VERSION }}-native

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'rc') || contains(steps.version.outputs.VERSION, 'beta') }}
