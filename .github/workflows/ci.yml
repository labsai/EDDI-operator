name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile
        run: ./mvnw compile -DskipTests

      - name: Run unit tests
        run: ./mvnw test

      - name: Package (JVM)
        run: ./mvnw package -DskipTests

      - name: Build JVM operator image
        run: docker build -f Dockerfile.jvm -t eddi-operator:test .

      - name: Validate OLM bundle
        run: |
          if [ -d "target/bundle" ]; then
            echo "Bundle directory found, validating..."
            # operator-sdk bundle validate will be run when operator-sdk is installed
          else
            echo "No bundle directory found, skipping validation"
          fi

  native-build:
    name: Native Image Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'mandrel'
          cache: 'maven'

      - name: Build native image
        run: ./mvnw package -Pnative -DskipTests

      - name: Build native operator image
        run: docker build -f Dockerfile.native -t eddi-operator:test-native .
